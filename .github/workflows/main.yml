name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::El secreto HF_TOKEN no existe o está vacío. Ve a Settings > Secrets > Actions."
            exit 1
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git remote add hf https://nmarafo:$HF_TOKEN@huggingface.co/spaces/nmarafo/lomloe-agentic-rag
          git push -f hf main
