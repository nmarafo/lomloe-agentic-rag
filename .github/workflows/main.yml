name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::El secreto HF_TOKEN no existe o está vacío. Ve a Settings > Secrets > Actions."
            exit 1
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          
          # URL segura con .git al final
          HF_URL="https://nmarafo:$HF_TOKEN@huggingface.co/spaces/nmarafo/lomloe-agentic-rag.git"
          
          echo "Verificando conexión con Hugging Face..."
          git ls-remote "$HF_URL" || (echo "::error::Fallo de conexión inicial con Hugging Face." && exit 1)
          
          git remote add hf "$HF_URL"
          echo "Sincronizando..."
          # Capturamos el error para mostrarlo en el log de GitHub si falla
          git push -f hf HEAD:main 2>&1 | tee push_log.txt || (echo "::error::Fallo en el envío. Detalles: $(cat push_log.txt)" && exit 1)
