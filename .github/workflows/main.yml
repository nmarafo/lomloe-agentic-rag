name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::El secreto HF_TOKEN no existe o está vacío. Ve a Settings > Secrets > Actions."
            exit 1
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          
          # URL segura (sin echo para no filtrar el token)
          HF_URL="https://nmarafo:$HF_TOKEN@huggingface.co/spaces/nmarafo/lomloe-agentic-rag"
          
          echo "Verificando conexión con Hugging Face..."
          if ! git ls-remote "$HF_URL" > /dev/null 2>&1; then
            echo "::error::Error de Autenticación: El token es inválido o el usuario/espacio no existe."
            exit 1
          fi
          
          git remote add hf "$HF_URL"
          echo "Sincronizando..."
          # Intenta push a main, y si falla (porque HF use master), intenta a master
          git push -f hf main || git push -f hf main:master
